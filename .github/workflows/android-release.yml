name: Android release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run tauri android init -- --ci

      - name: Build release APK
        run: |
          BUILD_LOG="$RUNNER_TEMP/android-build.log"
          if npm run tauri android build -- --target aarch64 armv7 --apk --ci > "$BUILD_LOG" 2>&1; then
            echo "Android release APK built successfully."
          else
            STATUS=$?
            echo "::group::Android build log"
            cat "$BUILD_LOG"
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Restore signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sorayori.jks"

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          UNSIGNED_APK="$(find src-tauri/gen/android -type f -name '*release-unsigned.apk' -print -quit)"
          test -n "$UNSIGNED_APK"
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED_APK" "$RUNNER_TEMP/Sorayori-aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/sorayori.jks" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$RUNNER_TEMP/Sorayori-release.apk" \
            "$RUNNER_TEMP/Sorayori-aligned.apk"
          "$BUILD_TOOLS/apksigner" verify --verbose "$RUNNER_TEMP/Sorayori-release.apk"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Sorayori-Android-release
          path: ${{ runner.temp }}/Sorayori-release.apk
          if-no-files-found: error
          retention-days: 30
